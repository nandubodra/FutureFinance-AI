spring.application.name=futurefinance
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/futurefinance_db
spring.datasource.username=futurefinance
spring.datasource.password=secure_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_change_this_in_production}
jwt.expiration=${JWT_EXPIRATION:86400}

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:sk-your-api-key-here}
openai.model=gpt-4

# Logging
logging.level.root=INFO
logging.level.com.futurefinance=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
