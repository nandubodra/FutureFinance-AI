version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: futurefinance_db
    environment:
      POSTGRES_USER: futurefinance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: futurefinance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - futurefinance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurefinance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futurefinance_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/futurefinance_db
      SPRING_DATASOURCE_USERNAME: futurefinance
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - futurefinance_network
    restart: unless-stopped

  # Python ML Engine
  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: futurefinance_ml
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
    networks:
      - futurefinance_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: futurefinance_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:8080
      REACT_APP_ML_URL: http://ml-engine:5000
    depends_on:
      - backend
    networks:
      - futurefinance_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: futurefinance_cache
    ports:
      - "6379:6379"
    networks:
      - futurefinance_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  futurefinance_network:
    driver: bridge
